<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票技术指标分析工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
  background: #0d1117; color: #c9d1d9; font-size: 13px; line-height: 1.5;
}
/* ===== 顶栏 ===== */
.topbar {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  background: #161b22; border-bottom: 0.5px solid #30363d;
}
.topbar .title { font-weight: 600; font-size: 15px; white-space: nowrap; }
.topbar .spacer { flex: 1; }
.topbar input[type=text] {
  width: 120px; padding: 4px 8px; font-size: 12px;
  background: #0d1117; border: 0.5px solid #30363d; border-radius: 4px; color: #c9d1d9;
}
.topbar select {
  padding: 4px 8px; font-size: 12px;
  background: #0d1117; border: 0.5px solid #30363d; border-radius: 4px; color: #c9d1d9;
}
.topbar button {
  padding: 4px 10px; font-size: 12px;
  background: #21262d; border: 0.5px solid #30363d; border-radius: 4px; color: #c9d1d9; cursor: pointer;
}
.topbar button:hover { background: #30363d; }
.topbar .file-btn { position: relative; overflow: hidden; }
.topbar .file-btn input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

/* ===== 收盘价主图 ===== */
.price-section {
  margin: 8px 16px; padding: 10px 14px;
  background: #161b22; border: 0.5px solid #30363d; border-radius: 8px;
}
.price-section .label { font-size: 11px; color: #8b949e; margin-bottom: 6px; }

/* ===== 行配对布局 ===== */
.ind-row {
  display: grid; grid-template-columns: 210px 1fr; gap: 0;
  margin: 0 16px 6px; border: 0.5px solid #30363d; border-radius: 8px; overflow: hidden;
}
.param-side {
  background: #161b22; padding: 12px 14px;
  border-right: 0.5px solid #30363d;
  display: flex; flex-direction: column; gap: 8px;
}
.param-head { display: flex; align-items: center; justify-content: space-between; }
.ind-name { font-weight: 600; font-size: 14px; }
.ind-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px; white-space: nowrap;
}
.tag-purple { background: #1f1f3a; color: #a5a0ee; }
.tag-teal   { background: #0d3329; color: #5dcaa5; }
.tag-amber  { background: #3a2e0d; color: #fac775; }
.tag-coral  { background: #3a1d10; color: #f0997b; }

.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row label { font-size: 11px; color: #8b949e; width: 44px; flex-shrink: 0; }
.slider-row .val { font-size: 11px; font-weight: 600; min-width: 28px; text-align: right; color: #c9d1d9; }
input[type=range] {
  flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
  background: #30363d; border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 12px; height: 12px; border-radius: 50%; background: #58a6ff; cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%; background: #58a6ff; cursor: pointer; border: none;
}

.preset-btns { display: flex; gap: 4px; margin-top: 2px; }
.preset-btns button {
  flex: 1; font-size: 10px; padding: 3px 4px; border-radius: 4px;
  border: 0.5px solid #30363d; background: transparent; color: #8b949e; cursor: pointer;
}
.preset-btns button:hover { background: #21262d; }
.preset-btns button.active {
  border-color: #58a6ff; color: #58a6ff; background: rgba(88,166,255,0.1);
}
.reset-link { font-size: 10px; color: #6e7681; cursor: pointer; text-decoration: underline; text-align: right; }
.reset-link:hover { color: #8b949e; }

.chart-side {
  padding: 8px 14px;
  display: flex; flex-direction: column; justify-content: center;
  background: #0d1117;
}
.chart-info { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.chart-info b { color: #c9d1d9; }
.chart-canvas-wrap { height: 100px; position: relative; }

/* ===== 策略模块 ===== */
.strategy-section {
  margin: 10px 16px 6px; border: 0.5px solid #30363d; border-radius: 8px; overflow: hidden;
}
.strategy-header {
  padding: 8px 14px; background: #161b22; border-bottom: 0.5px solid #30363d;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.strategy-header .s-title { font-weight: 600; font-size: 14px; }
.strategy-header .s-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  background: #1a2332; color: #58a6ff;
}
.strategy-header .strat-select {
  font-size: 12px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
  border: 0.5px solid #30363d; background: #21262d; color: #c9d1d9;
}
.strategy-params {
  display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap;
}
.strategy-params .slider-row { display: flex; align-items: center; gap: 6px; }
.strategy-params .slider-row label { font-size: 11px; color: #8b949e; }
.strategy-params .slider-row .val { font-size: 11px; font-weight: 600; min-width: 20px; text-align: right; color: #c9d1d9; }
.strategy-params .s-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
  border: 0.5px solid #30363d; background: #21262d; color: #c9d1d9;
}
.strategy-params .s-btn:hover { background: #30363d; }
.strat-ma-only { display: none; }
.strat-turtle-only { display: none; }
.strat-ma-only.active { display: flex; }
.strat-turtle-only.active { display: flex; }

.strategy-charts {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0;
}
.s-chart-box {
  padding: 8px 14px; border-right: 0.5px solid #30363d;
}
.s-chart-box:last-child { border-right: none; }
.s-chart-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.s-chart-wrap { height: 140px; position: relative; }

.strategy-metrics {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 0;
  border-top: 0.5px solid #30363d; background: #0d1117;
}
.metric-cell {
  padding: 8px 6px; text-align: center; border-right: 0.5px solid #30363d;
}
.metric-cell:last-child { border-right: none; }
.metric-name { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
.metric-val { font-size: 14px; font-weight: 700; }
.metric-val.pos { color: #f85149; }
.metric-val.neg { color: #3fb950; }
.metric-val.neutral { color: #d29922; }

/* ===== 底栏状态 ===== */
.status-bar {
  display: flex; margin: 0 16px 12px;
  padding: 8px 14px; border: 0.5px solid #30363d; border-radius: 8px;
  background: #161b22; font-size: 11px; justify-content: space-between; flex-wrap: wrap; gap: 4px;
}
.status-item { display: flex; align-items: center; gap: 5px; padding: 0 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-gray { background: #8b949e; }
.dot-red { background: #f85149; }
.dot-green { background: #3fb950; }
.dot-amber { background: #d29922; }

/* ===== Chart.js 主题覆盖 ===== */
canvas { font-family: "Microsoft YaHei", sans-serif !important; }

/* ===== 实时数据 ===== */
.fetch-btn {
  font-size: 12px; padding: 4px 12px; border-radius: 4px; cursor: pointer;
  border: 0.5px solid #f0883e; background: #1a2332; color: #f0883e;
  font-weight: 600; transition: all 0.2s;
}
.fetch-btn:hover { background: #2d1a0e; }
.fetch-btn:disabled { opacity: 0.5; cursor: wait; }
#stockCode { cursor: text; }
.fetch-status {
  font-size: 11px; color: #8b949e; margin-left: 4px;
}
.fetch-status.ok { color: #3fb950; }
.fetch-status.err { color: #f85149; }
.fetch-status.loading { color: #d29922; }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <span class="title">股票技术指标分析工具</span>
  <span class="spacer"></span>
  <input type="text" id="stockCode" value="002594.SZ" placeholder="输入股票代码" onkeydown="if(event.key==='Enter')fetchStockData()">
  <button class="fetch-btn" id="fetchBtn" onclick="fetchStockData()">获取实时数据</button>
  <span class="fetch-status" id="fetchStatus"></span>
  <select id="dateRange">
    <option value="30">近1月</option>
    <option value="90">近3月</option>
    <option value="180">近6月</option>
    <option value="365" selected>近1年</option>
    <option value="9999">全部</option>
  </select>
  <select id="adjType" onchange="if(rawData.length>0&&rawDataSource==='api')fetchStockData()">
    <option value="qfq" selected>前复权</option>
    <option value="none">不复权</option>
    <option value="hfq">后复权</option>
  </select>
  <label class="file-btn">
    <button type="button">导入CSV</button>
    <input type="file" id="csvFile" accept=".csv">
  </label>
</div>

<!-- 收盘价主图 -->
<div class="price-section">
  <div class="label" id="priceLabel">收盘价走势 · 加载中...</div>
  <div style="height:100px;position:relative"><canvas id="priceChart"></canvas></div>
</div>

<!-- RSI 行 -->
<div class="ind-row">
  <div class="param-side">
    <div class="param-head"><span class="ind-name">RSI</span><span class="ind-tag tag-purple">相对强弱</span></div>
    <div class="slider-row"><label>周期</label><input type="range" id="rsi_period" min="2" max="50" value="14"><span class="val" id="rsi_period_v">14</span></div>
    <div class="slider-row"><label>超买线</label><input type="range" id="rsi_ob" min="60" max="90" value="70"><span class="val" id="rsi_ob_v">70</span></div>
    <div class="slider-row"><label>超卖线</label><input type="range" id="rsi_os" min="10" max="40" value="30"><span class="val" id="rsi_os_v">30</span></div>
    <div class="preset-btns">
      <button onclick="setPreset('rsi','conservative')">保守</button>
      <button onclick="setPreset('rsi','standard')" class="active">标准</button>
      <button onclick="setPreset('rsi','aggressive')">激进</button>
    </div>
    <div class="reset-link" onclick="resetParams('rsi')">恢复默认</div>
  </div>
  <div class="chart-side">
    <div class="chart-info" id="rsi_info">RSI 计算中...</div>
    <div class="chart-canvas-wrap"><canvas id="rsiChart"></canvas></div>
  </div>
</div>

<!-- MACD 行 -->
<div class="ind-row">
  <div class="param-side">
    <div class="param-head"><span class="ind-name">MACD</span><span class="ind-tag tag-teal">趋势动量</span></div>
    <div class="slider-row"><label>快线</label><input type="range" id="macd_fast" min="3" max="30" value="12"><span class="val" id="macd_fast_v">12</span></div>
    <div class="slider-row"><label>慢线</label><input type="range" id="macd_slow" min="10" max="60" value="26"><span class="val" id="macd_slow_v">26</span></div>
    <div class="slider-row"><label>信号线</label><input type="range" id="macd_signal" min="3" max="30" value="9"><span class="val" id="macd_signal_v">9</span></div>
    <div class="preset-btns">
      <button onclick="setPreset('macd','conservative')">保守</button>
      <button onclick="setPreset('macd','standard')" class="active">标准</button>
      <button onclick="setPreset('macd','aggressive')">激进</button>
    </div>
    <div class="reset-link" onclick="resetParams('macd')">恢复默认</div>
  </div>
  <div class="chart-side">
    <div class="chart-info" id="macd_info">MACD 计算中...</div>
    <div class="chart-canvas-wrap"><canvas id="macdChart"></canvas></div>
  </div>
</div>

<!-- 布林带 行 -->
<div class="ind-row">
  <div class="param-side">
    <div class="param-head"><span class="ind-name">BOLL</span><span class="ind-tag tag-amber">布林带</span></div>
    <div class="slider-row"><label>周期</label><input type="range" id="boll_period" min="5" max="60" value="20"><span class="val" id="boll_period_v">20</span></div>
    <div class="slider-row"><label>σ倍数</label><input type="range" id="boll_std" min="10" max="35" value="20"><span class="val" id="boll_std_v">2.0</span></div>
    <div style="height:4px"></div>
    <div class="preset-btns">
      <button onclick="setPreset('boll','conservative')">保守</button>
      <button onclick="setPreset('boll','standard')" class="active">标准</button>
      <button onclick="setPreset('boll','aggressive')">激进</button>
    </div>
    <div class="reset-link" onclick="resetParams('boll')">恢复默认</div>
  </div>
  <div class="chart-side">
    <div class="chart-info" id="boll_info">布林带计算中...</div>
    <div class="chart-canvas-wrap"><canvas id="bollChart"></canvas></div>
  </div>
</div>

<!-- KDJ 行 -->
<div class="ind-row">
  <div class="param-side">
    <div class="param-head"><span class="ind-name">KDJ</span><span class="ind-tag tag-coral">随机指标</span></div>
    <div class="slider-row"><label>RSV周期</label><input type="range" id="kdj_n" min="3" max="30" value="9"><span class="val" id="kdj_n_v">9</span></div>
    <div class="slider-row"><label>K平滑</label><input type="range" id="kdj_m1" min="2" max="10" value="3"><span class="val" id="kdj_m1_v">3</span></div>
    <div class="slider-row"><label>D平滑</label><input type="range" id="kdj_m2" min="2" max="10" value="3"><span class="val" id="kdj_m2_v">3</span></div>
    <div class="preset-btns">
      <button onclick="setPreset('kdj','conservative')">保守</button>
      <button onclick="setPreset('kdj','standard')" class="active">标准</button>
      <button onclick="setPreset('kdj','aggressive')">激进</button>
    </div>
    <div class="reset-link" onclick="resetParams('kdj')">恢复默认</div>
  </div>
  <div class="chart-side">
    <div class="chart-info" id="kdj_info">KDJ 计算中...</div>
    <div class="chart-canvas-wrap"><canvas id="kdjChart"></canvas></div>
  </div>
</div>

<!-- 策略模块 -->
<div class="strategy-section">
  <div class="strategy-header">
    <span class="s-title">交易策略</span>
    <select class="strat-select" id="stratType" onchange="switchStrategy()">
      <option value="ma">双均线策略</option>
      <option value="turtle">海龟策略</option>
    </select>
    <span class="s-tag" id="stratTag">MA交叉 · 金叉买入 / 死叉卖出</span>
    <div class="strategy-params">
      <!-- 双均线参数 -->
      <div class="slider-row strat-ma-only active" id="maParams">
        <label>短均线</label><input type="range" id="strat_short" min="2" max="30" value="5"><span class="val" id="strat_short_v">5</span>
        <label>长均线</label><input type="range" id="strat_long" min="5" max="60" value="15"><span class="val" id="strat_long_v">15</span>
      </div>
      <!-- 海龟参数 -->
      <div class="slider-row strat-turtle-only" id="turtleParams">
        <label>入场通道</label><input type="range" id="turtle_entry" min="5" max="55" value="20"><span class="val" id="turtle_entry_v">20</span>
        <label>出场通道</label><input type="range" id="turtle_exit" min="3" max="30" value="10"><span class="val" id="turtle_exit_v">10</span>
        <label>ATR周期</label><input type="range" id="turtle_atr" min="5" max="55" value="20"><span class="val" id="turtle_atr_v">20</span>
        <label>止损倍数</label><input type="range" id="turtle_stop" min="5" max="40" value="20"><span class="val" id="turtle_stop_v">2.0</span>
      </div>
      <button class="s-btn" onclick="resetStrategy()">恢复默认</button>
    </div>
  </div>
  <div class="strategy-charts">
    <div class="s-chart-box">
      <div class="s-chart-label" id="stratSignalLabel">策略信号图</div>
      <div class="s-chart-wrap"><canvas id="stratSignalChart"></canvas></div>
    </div>
    <div class="s-chart-box">
      <div class="s-chart-label" id="stratNavLabel">净值曲线 vs 基准</div>
      <div class="s-chart-wrap"><canvas id="stratNavChart"></canvas></div>
    </div>
  </div>
  <div class="strategy-metrics" id="stratMetrics">
    <div class="metric-cell"><div class="metric-name">年化收益率</div><div class="metric-val" id="m_annReturn">-</div></div>
    <div class="metric-cell"><div class="metric-name">最大回撤</div><div class="metric-val" id="m_mdd">-</div></div>
    <div class="metric-cell"><div class="metric-name">年化波动率</div><div class="metric-val" id="m_vol">-</div></div>
    <div class="metric-cell"><div class="metric-name">夏普比率</div><div class="metric-val" id="m_sharpe">-</div></div>
    <div class="metric-cell"><div class="metric-name">胜率</div><div class="metric-val" id="m_winRate">-</div></div>
    <div class="metric-cell"><div class="metric-name">盈亏比</div><div class="metric-val" id="m_plr">-</div></div>
    <div class="metric-cell"><div class="metric-name">期望收益(R)</div><div class="metric-val" id="m_expR">-</div></div>
  </div>
</div>

<!-- 底栏状态 -->
<div class="status-bar" id="statusBar"></div>

// ==================== CSV解析 ====================
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const header = lines[0].replace(/^\ufeff/, '').split(',');
  const idx = {};
  ['trade_date','open','high','low','close','vol'].forEach(k => {
    idx[k] = header.indexOf(k);
  });
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    if (cols.length < 5) continue;
    const td = String(cols[idx.trade_date]).replace(/-/g, '');
    data.push({
      trade_date: td,
      dateLabel: td.slice(0,4)+'-'+td.slice(4,6)+'-'+td.slice(6,8),
      open: parseFloat(cols[idx.open]),
      high: parseFloat(cols[idx.high]),
      low: parseFloat(cols[idx.low]),
      close: parseFloat(cols[idx.close]),
      vol: parseFloat(cols[idx.vol]) || 0
    });
  }
  return data;
}

let rawDataSource = 'csv'; // 'csv' or 'api'

function buildSecid(code) {
  // 去除后缀和空格
  code = code.trim().toUpperCase().replace(/\.(SH|SZ|BJ)$/, '');
  // 6开头→上海(1.), 0/3开头→深圳(0.), 8/4开头→北交所(0.)
  if (code.startsWith('6')) return '1.' + code;
  if (code.startsWith('0') || code.startsWith('3')) return '0.' + code;
  if (code.startsWith('8') || code.startsWith('4')) return '0.' + code;
  // 默认深圳
  return '0.' + code;
}

function getAdjCode() {
  const adj = document.getElementById('adjType').value;
  if (adj === 'qfq') return 1;
  if (adj === 'hfq') return 2;
  return 0; // 不复权
}

function fetchStockData() {
  const code = document.getElementById('stockCode').value.trim();
  if (!code) { setFetchStatus('请输入股票代码', 'err'); return; }

  const secid = buildSecid(code);
  const fqt = getAdjCode();
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '获取中...';
  setFetchStatus(`正在获取 ${code} 数据...`, 'loading');

  // JSONP callback
  const cbName = 'emCallback_' + Date.now();
  const script = document.createElement('script');

  // 东方财富日K线历史数据API (push2his不是push2)
  // klt=101(日线), fqt=1(前复权), lmt=300(取300条)
  // beg/end: 日期范围, cb: JSONP回调函数名
  const now = new Date();
  const begDate = (now.getFullYear() - 2) + '0101';
  const endDate = now.getFullYear() + 
    String(now.getMonth() + 1).padStart(2, '0') + 
    String(now.getDate()).padStart(2, '0');
  const url = `http://push2his.eastmoney.com/api/qt/stock/kline/get` +
    `?secid=${secid}` +
    `&fields1=f1,f2,f3,f4,f5,f6` +
    `&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61` +
    `&klt=101&fqt=${fqt}&beg=${begDate}&end=${endDate}&lmt=300` +
    `&cb=${cbName}`;

  let timeout = setTimeout(() => {
    cleanup();
    setFetchStatus('请求超时，请检查股票代码或网络', 'err');
    btn.disabled = false;
    btn.textContent = '获取实时数据';
  }, 10000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[cbName] = function(resp) {
    cleanup();

    if (!resp || !resp.data || !resp.data.klines || resp.data.klines.length === 0) {
      setFetchStatus('未获取到数据，请检查股票代码', 'err');
      btn.disabled = false;
      btn.textContent = '获取实时数据';
      return;
    }

    // 解析东方财富数据
    // klines格式: "date,open,close,high,low,volume,amount,amplitude,changePct,change,turnover"
    const klines = resp.data.klines;
    const data = [];
    for (let i = 0; i < klines.length; i++) {
      const parts = klines[i].split(',');
      if (parts.length < 7) continue;
      const td = parts[0].replace(/-/g, '');
      data.push({
        trade_date: td,
        dateLabel: parts[0],
        open: parseFloat(parts[1]),
        close: parseFloat(parts[2]),
        high: parseFloat(parts[3]),
        low: parseFloat(parts[4]),
        vol: parseFloat(parts[5]) || 0
      });
    }

    if (data.length < 10) {
      setFetchStatus(`仅获取到${data.length}条数据，数据不足`, 'err');
      btn.disabled = false;
      btn.textContent = '获取实时数据';
      return;
    }

    rawData = data;
    rawDataSource = 'api';

    // 更新股票名称显示
    const name = resp.data.name || '';
    const displayCode = code.includes('.') ? code : code;
    document.getElementById('priceLabel').textContent =
      `收盘价走势 · ${name} ${displayCode} · ${data.length}条 · ${data[0].dateLabel} ~ ${data[data.length-1].dateLabel}`;

    setFetchStatus(`✓ ${name || displayCode} · ${data.length}条数据 · ${data[data.length-1].dateLabel}最新`, 'ok');
    btn.disabled = false;
    btn.textContent = '获取实时数据';

    recalcAll();
  };

  script.onerror = function() {
    cleanup();
    setFetchStatus('网络错误，请稍后重试', 'err');
    btn.disabled = false;
    btn.textContent = '获取实时数据';
  };

  script.src = url;
  document.body.appendChild(script);
}

const Indicators = {
  // EMA递推: EMA_t = α*price + (1-α)*EMA_{t-1}, α = 2/(span+1)
  ema(values, span) {
    const alpha = 2 / (span + 1);
    const result = new Array(values.length).fill(NaN);
    let prev = values[0];
    result[0] = values[0];
    for (let i = 1; i < values.length; i++) {
      prev = alpha * values[i] + (1 - alpha) * prev;
      result[i] = prev;
    }
    return result;
  },

  // Wilder平滑: α = 1/period (等价于 ewm(alpha=1/period, adjust=False))
  wilderEwm(values, period) {
    const alpha = 1 / period;
    const result = new Array(values.length).fill(NaN);
    let prev = values[0];
    result[0] = values[0];
    for (let i = 1; i < values.length; i++) {
      prev = alpha * values[i] + (1 - alpha) * prev;
      result[i] = prev;
    }
    return result;
  },

  rsi(close, period) {
    const n = close.length;
    const gain = new Array(n).fill(0);
    const loss = new Array(n).fill(0);
    for (let i = 1; i < n; i++) {
      const delta = close[i] - close[i - 1];
      gain[i] = Math.max(delta, 0);
      loss[i] = Math.max(-delta, 0);
    }
    const avgGain = this.wilderEwm(gain, period);
    const avgLoss = this.wilderEwm(loss, period);
    const rsi = new Array(n).fill(NaN);
    for (let i = 0; i < n; i++) {
      if (i < period) { rsi[i] = NaN; continue; }
      if (avgLoss[i] === 0) {
        rsi[i] = 100;
      } else {
        const rs = avgGain[i] / avgLoss[i];
        rsi[i] = 100 - 100 / (1 + rs);
      }
    }
    return rsi;
  },

  macd(close, fast, slow, signal) {
    const emaFast = this.ema(close, fast);
    const emaSlow = this.ema(close, slow);
    const dif = close.map((_, i) => emaFast[i] - emaSlow[i]);
    const dea = this.ema(dif, signal);
    const hist = dif.map((d, i) => (d - dea[i]) * 2);
    return { dif, dea, hist };
  },

  boll(close, period, numStd) {
    const n = close.length;
    const mid = new Array(n).fill(NaN);
    const upper = new Array(n).fill(NaN);
    const lower = new Array(n).fill(NaN);
    for (let i = period - 1; i < n; i++) {
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) sum += close[j];
      const mean = sum / period;
      let varSum = 0;
      for (let j = i - period + 1; j <= i; j++) varSum += (close[j] - mean) ** 2;
      const std = Math.sqrt(varSum / period); // ddof=0
      mid[i] = mean;
      upper[i] = mean + numStd * std;
      lower[i] = mean - numStd * std;
    }
    return { upper, mid, lower };
  },

  kdj(high, low, close, n, m1, m2) {
    const len = close.length;
    const rsv = new Array(len).fill(50); // fillna(50) 等价
    for (let i = 0; i < len; i++) {
      if (i < n - 1) { rsv[i] = 50; continue; }
      let hh = -Infinity, ll = Infinity;
      for (let j = i - n + 1; j <= i; j++) {
        if (high[j] > hh) hh = high[j];
        if (low[j] < ll) ll = low[j];
      }
      const denom = hh - ll;
      rsv[i] = denom > 0 ? (close[i] - ll) / denom * 100 : 50;
    }
    // K = ewm(rsv, alpha=1/m1) → span=m1
    const k = this.wilderEwm(rsv, m1);
    const d = this.wilderEwm(k, m2);
    const j = k.map((kv, i) => 3 * kv - 2 * d[i]);
    return { k, d, j };
  }
};

function getVisibleData() {
  const range = parseInt(document.getElementById('dateRange').value);
  if (range >= rawData.length || range >= 9999) return rawData;
  return rawData.slice(-range);
}

function updatePriceChart(data) {
  const labels = data.map(d => d.dateLabel);
  const closes = data.map(d => d.close);
  charts.price.data.labels = labels;
  charts.price.data.datasets[0].data = closes;
  charts.price.update('none');
  document.getElementById('priceLabel').textContent =
    `收盘价走势 · ${data.length}个交易日 · ${data[0].dateLabel} 至 ${data[data.length-1].dateLabel}`;
}

function updateRSI(data) {
  const period = parseInt(document.getElementById('rsi_period').value);
  const ob = parseInt(document.getElementById('rsi_ob').value);
  const os = parseInt(document.getElementById('rsi_os').value);
  const close = data.map(d => d.close);
  const rsi = Indicators.rsi(close, period);
  const labels = data.map(d => d.dateLabel);

  charts.rsi.data.labels = labels;
  charts.rsi.data.datasets[0].data = rsi;
  charts.rsi.data.datasets[1].data = close.map(() => ob);
  charts.rsi.data.datasets[2].data = close.map(() => os);
  charts.rsi.update('none');

  const lastRSI = rsi[rsi.length - 1];
  const validRSI = rsi.filter(v => !isNaN(v));
  const obCount = validRSI.filter(v => v > ob).length;
  const osCount = validRSI.filter(v => v < os).length;
  let status = '中性', dotClass = 'dot-gray';
  if (lastRSI > ob) { status = '超买'; dotClass = 'dot-red'; }
  else if (lastRSI < os) { status = '超卖'; dotClass = 'dot-green'; }

  document.getElementById('rsi_info').innerHTML =
    `RSI(${period}) · 末值 <b>${lastRSI.toFixed(2)}</b> · <b>${status}</b> · 超买${obCount}天/超卖${osCount}天`;
  updateStatus('rsi', `RSI ${lastRSI.toFixed(1)} ${status}`, dotClass);
}

  const slow = parseInt(document.getElementById('macd_slow').value);
  const signal = parseInt(document.getElementById('macd_signal').value);

  charts.boll.data.datasets[1].data = mid;

  const lastClose = close[close.length - 1];
  const lastUpper = upper[upper.length - 1];
  const lastMid = mid[mid.length - 1];

// ==================== 双均线策略引擎 ====================
const Strategy = {
  // 计算SMA
  sma(close, period) {
    const n = close.length;
    const ma = new Array(n).fill(NaN);
    for (let i = 0; i < n; i++) {
      if (i < period - 1) { ma[i] = NaN; continue; }
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) sum += close[j];
      ma[i] = sum / period;
    }
    // min_periods=1: 前几个用已有数据算
    for (let i = 0; i < period - 1 && i < n; i++) {
      let sum = 0;
      for (let j = 0; j <= i; j++) sum += close[j];
      ma[i] = sum / (i + 1);
    }
    return ma;
  },

  // 生成金叉死叉信号 + 持仓
  signals(maShort, maLong) {
    const n = maShort.length;
    const signal = new Array(n).fill(0);
    const position = new Array(n).fill(0);
    let holding = 0;
    for (let i = 1; i < n; i++) {
      const prevDiff = maShort[i-1] - maLong[i-1];
      const currDiff = maShort[i] - maLong[i];
      if (prevDiff < 0 && currDiff > 0) { signal[i] = 1; holding = 1; }
      else if (prevDiff > 0 && currDiff < 0) { signal[i] = -1; holding = 0; }
      position[i] = holding;
    }
    return { signal, position };
  },

  // 回测 + 7项指标
  backtest(data, shortP, longP) {
    const close = data.map(d => d.close);
    const n = close.length;
    const maShort = this.sma(close, shortP);
    const maLong = this.sma(close, longP);
    const { signal, position } = this.signals(maShort, maLong);

    // 日收益率
    const stockReturn = new Array(n).fill(0);
    for (let i = 1; i < n; i++) {
      stockReturn[i] = (close[i] - close[i-1]) / close[i-1];
    }

    // 策略日收益率 = 前一日持仓 × 当日股票收益
    const stratReturn = new Array(n).fill(0);
    for (let i = 1; i < n; i++) {
      stratReturn[i] = position[i-1] * stockReturn[i];
    }

    // 累计净值
    const stratNAV = new Array(n).fill(1);
    const benchNAV = new Array(n).fill(1);
    for (let i = 1; i < n; i++) {
      stratNAV[i] = stratNAV[i-1] * (1 + stratReturn[i]);
      benchNAV[i] = benchNAV[i-1] * (1 + stockReturn[i]);
    }

    // 扣除交易成本 (佣金万分之三 + 印花税千分之一卖出方)
    const commission = 0.0003, stampTax = 0.001;
    let totalCost = 0;
    const capital = 100000;
    for (let i = 0; i < n; i++) {
      if (signal[i] === 1) totalCost += capital * commission;
      else if (signal[i] === -1) totalCost += capital * (commission + stampTax);
    }
    const costFactor = 1 - totalCost / (capital * stratNAV[n-1]);
    for (let i = 0; i < n; i++) stratNAV[i] *= costFactor;

    // === 7项指标 ===
    const finalNAV = stratNAV[n-1];
    const benchFinal = benchNAV[n-1];
    const cumulativeReturn = (finalNAV - 1) * 100;
    const benchReturn = (benchFinal - 1) * 100;

    // 最大回撤
    let maxNAV = -Infinity, maxDD = 0, benchMaxNAV = -Infinity, benchMDD = 0;
    const ddArr = new Array(n), benchDDArr = new Array(n);
    for (let i = 0; i < n; i++) {
      if (stratNAV[i] > maxNAV) maxNAV = stratNAV[i];
      ddArr[i] = (stratNAV[i] - maxNAV) / maxNAV;
      if (ddArr[i] < maxDD) maxDD = ddArr[i];
      if (benchNAV[i] > benchMaxNAV) benchMaxNAV = benchNAV[i];
      benchDDArr[i] = (benchNAV[i] - benchMaxNAV) / benchMaxNAV;
      if (benchDDArr[i] < benchMDD) benchMDD = benchDDArr[i];
    }
    const mdd = maxDD * 100;
    const benchMddPct = benchMDD * 100;

    // 年化波动率
    const tradingDays = 252;
    const meanRet = stratReturn.reduce((a,b) => a+b, 0) / n;
    const variance = stratReturn.reduce((a,b) => a + (b - meanRet)**2, 0) / n;
    const dailyStd = Math.sqrt(variance);
    const annVol = dailyStd * Math.sqrt(tradingDays) * 100;

    // 基准波动率
    const benchMean = stockReturn.reduce((a,b) => a+b, 0) / n;
    const benchVar = stockReturn.reduce((a,b) => a + (b - benchMean)**2, 0) / n;
    const benchVol = Math.sqrt(benchVar) * Math.sqrt(tradingDays) * 100;

    // 夏普比率
    const rf = 0.02 / tradingDays;
    const excessMean = meanRet - rf;
    const sharpe = dailyStd > 0 ? Math.sqrt(tradingDays) * excessMean / dailyStd : 0;

    // 年化收益率
    const annReturn = (Math.pow(finalNAV, tradingDays / n) - 1) * 100;

    // 胜率 + 盈亏比 + 期望收益
    let winCount = 0, lossCount = 0, totalTrips = 0;
    let winProfits = [], lossAmounts = [];
    let buyPrice = null;
    for (let i = 0; i < n; i++) {
      if (signal[i] === 1) { buyPrice = close[i]; }
      else if (signal[i] === -1 && buyPrice !== null) {
        const ret = (close[i] - buyPrice) / buyPrice;
        if (ret > 0) { winCount++; winProfits.push(ret); }
        else { lossCount++; lossAmounts.push(Math.abs(ret)); }
        totalTrips++;
        buyPrice = null;
      }
    }
    const winRate = totalTrips > 0 ? winCount / totalTrips * 100 : 0;
    const avgWin = winProfits.length > 0 ? winProfits.reduce((a,b)=>a+b,0)/winProfits.length : 0;
    const avgLoss = lossAmounts.length > 0 ? lossAmounts.reduce((a,b)=>a+b,0)/lossAmounts.length : 0;
    const plr = avgLoss > 0 ? avgWin / avgLoss : 0;
    const expR = avgLoss > 0 ? (winCount * avgWin - lossCount * avgLoss) / (totalTrips * avgLoss) : 0;

    // 买卖信号点
    const buyPoints = [], sellPoints = [];
    for (let i = 0; i < n; i++) {
      if (signal[i] === 1) buyPoints.push({ idx: i, price: close[i] });
      else if (signal[i] === -1) sellPoints.push({ idx: i, price: close[i] });
    }

    return {
      close, maShort, maLong, signal, position,
      stratNAV, benchNAV, ddArr, benchDDArr,
      buyPoints, sellPoints,
      metrics: { cumulativeReturn, benchReturn, annReturn, mdd, benchMddPct,
                 annVol, benchVol, sharpe, winRate, plr, expR,
                 nTrades: buyPoints.length + sellPoints.length,
                 buyCount: buyPoints.length, sellCount: sellPoints.length, totalTrips }
    };
  }
};

// ==================== 海龟策略引擎 ====================
const TurtleStrategy = {
  // 计算唐奇安通道 (shift(1) 后 rolling, 不含当日)
  donchian(high, low, entryP, exitP) {
    const n = high.length;
    const entryUpper = new Array(n).fill(NaN);
    const entryLower = new Array(n).fill(NaN);
    const exitLower = new Array(n).fill(NaN);
    for (let i = 0; i < n; i++) {
      // 入场通道: 前 entryP 日的 high/low (shift 1)
      if (i >= 1) {
        let hu = -Infinity, ll = Infinity;
        const eStart = Math.max(0, i - entryP);
        for (let j = eStart; j < i; j++) {
          if (high[j] > hu) hu = high[j];
          if (low[j] < ll) ll = low[j];
        }
        entryUpper[i] = hu;
        entryLower[i] = ll;
        // 出场通道: 前 exitP 日的 low
        let el = Infinity;
        const xStart = Math.max(0, i - exitP);
        for (let j = xStart; j < i; j++) {
          if (low[j] < el) el = low[j];
        }
        exitLower[i] = el;
      }
    }
    return { entryUpper, entryLower, exitLower };
  },

  // 计算 ATR (Wilder 平滑法)
  atr(high, low, close, period) {
    const n = close.length;
    const tr = new Array(n).fill(0);
    const atrArr = new Array(n).fill(0);
    for (let i = 0; i < n; i++) {
      if (i === 0) {
        tr[i] = high[i] - low[i];
      } else {
        tr[i] = Math.max(
          high[i] - low[i],
          Math.abs(high[i] - close[i-1]),
          Math.abs(low[i] - close[i-1])
        );
      }
    }
    // Wilder EMA: alpha = 1/period
    const alpha = 1.0 / period;
    atrArr[0] = tr[0];
    for (let i = 1; i < n; i++) {
      atrArr[i] = alpha * tr[i] + (1 - alpha) * atrArr[i-1];
    }
    return atrArr;
  },

  // 生成信号: 突破上轨买入, 跌破出场下轨或ATR止损卖出
  signals(close, entryUpper, exitLower, atrArr, stopMult) {
    const n = close.length;
    const signal = new Array(n).fill(0);
    const position = new Array(n).fill(0);
    const stopPrice = new Array(n).fill(NaN);
    let holding = 0;
    let stop = 0;

    for (let i = 0; i < n; i++) {
      const c = close[i];
      const eu = entryUpper[i];
      const xl = exitLower[i];
      const atr = atrArr[i];

      if (holding === 0) {
        if (!isNaN(eu) && c > eu) {
          signal[i] = 1;
          holding = 1;
          stop = c - stopMult * atr;
          stopPrice[i] = stop;
        }
      } else {
        // 跟踪止损: 仅上移
        const newStop = c - stopMult * atr;
        if (newStop > stop) stop = newStop;
        stopPrice[i] = stop;
        // 止损或出场
        if (c < stop) {
          signal[i] = -1;
          holding = 0;
          stop = 0;
        } else if (!isNaN(xl) && c < xl) {
          signal[i] = -1;
          holding = 0;
          stop = 0;
        }
      }
      position[i] = holding;
    }
    return { signal, position, stopPrice };
  },

  // 回测 + 7项指标
  backtest(data, entryP, exitP, atrP, stopMult) {
    const close = data.map(d => d.close);
    const high = data.map(d => d.high);
    const low = data.map(d => d.low);
    const n = close.length;

    const { entryUpper, entryLower, exitLower } = this.donchian(high, low, entryP, exitP);
    const atrArr = this.atr(high, low, close, atrP);
    const { signal, position, stopPrice } = this.signals(close, entryUpper, exitLower, atrArr, stopMult);

    // 日收益率
    const stockReturn = new Array(n).fill(0);
    for (let i = 1; i < n; i++) stockReturn[i] = (close[i] - close[i-1]) / close[i-1];

    const stratReturn = new Array(n).fill(0);
    for (let i = 1; i < n; i++) stratReturn[i] = position[i-1] * stockReturn[i];

    const stratNAV = new Array(n).fill(1);
    const benchNAV = new Array(n).fill(1);
    for (let i = 1; i < n; i++) {
      stratNAV[i] = stratNAV[i-1] * (1 + stratReturn[i]);
      benchNAV[i] = benchNAV[i-1] * (1 + stockReturn[i]);
    }

    // 交易成本
    const commission = 0.0003, stampTax = 0.001;
    let totalCost = 0;
    const capital = 100000;
    for (let i = 0; i < n; i++) {
      if (signal[i] === 1) totalCost += capital * commission;
      else if (signal[i] === -1) totalCost += capital * (commission + stampTax);
    }
    const costFactor = 1 - totalCost / (capital * stratNAV[n-1]);
    if (costFactor > 0) for (let i = 0; i < n; i++) stratNAV[i] *= costFactor;

    // === 7项指标 ===
    const finalNAV = stratNAV[n-1];
    const benchFinal = benchNAV[n-1];
    const cumulativeReturn = (finalNAV - 1) * 100;
    const benchReturn = (benchFinal - 1) * 100;

    let maxNAV = -Infinity, maxDD = 0, benchMaxNAV = -Infinity, benchMDD = 0;
    const ddArr = new Array(n), benchDDArr = new Array(n);
    for (let i = 0; i < n; i++) {
      if (stratNAV[i] > maxNAV) maxNAV = stratNAV[i];
      ddArr[i] = (stratNAV[i] - maxNAV) / maxNAV;
      if (ddArr[i] < maxDD) maxDD = ddArr[i];
      if (benchNAV[i] > benchMaxNAV) benchMaxNAV = benchNAV[i];
      benchDDArr[i] = (benchNAV[i] - benchMaxNAV) / benchMaxNAV;
      if (benchDDArr[i] < benchMDD) benchMDD = benchDDArr[i];
    }
    const mdd = maxDD * 100;
    const benchMddPct = benchMDD * 100;

    const tradingDays = 252;
    const meanRet = stratReturn.reduce((a,b) => a+b, 0) / n;
    const variance = stratReturn.reduce((a,b) => a + (b - meanRet)**2, 0) / n;
    const dailyStd = Math.sqrt(variance);
    const annVol = dailyStd * Math.sqrt(tradingDays) * 100;

    const benchMean = stockReturn.reduce((a,b) => a+b, 0) / n;
    const benchVar = stockReturn.reduce((a,b) => a + (b - benchMean)**2, 0) / n;
    const benchVol = Math.sqrt(benchVar) * Math.sqrt(tradingDays) * 100;

    const rf = 0.02 / tradingDays;
    const excessMean = meanRet - rf;
    const sharpe = dailyStd > 0 ? Math.sqrt(tradingDays) * excessMean / dailyStd : 0;

    const annReturn = (Math.pow(finalNAV, tradingDays / n) - 1) * 100;

    let winCount = 0, lossCount = 0, totalTrips = 0;
    let winProfits = [], lossAmounts = [];
    let buyPrice = null;
    for (let i = 0; i < n; i++) {
      if (signal[i] === 1) { buyPrice = close[i]; }
      else if (signal[i] === -1 && buyPrice !== null) {
        const ret = (close[i] - buyPrice) / buyPrice;
        if (ret > 0) { winCount++; winProfits.push(ret); }
        else { lossCount++; lossAmounts.push(Math.abs(ret)); }
        totalTrips++;
        buyPrice = null;
      }
    }
    const winRate = totalTrips > 0 ? winCount / totalTrips * 100 : 0;
    const avgWin = winProfits.length > 0 ? winProfits.reduce((a,b)=>a+b,0)/winProfits.length : 0;
    const avgLoss = lossAmounts.length > 0 ? lossAmounts.reduce((a,b)=>a+b,0)/lossAmounts.length : 0;
    const plr = avgLoss > 0 ? avgWin / avgLoss : 0;
    const expR = avgLoss > 0 ? (winCount * avgWin - lossCount * avgLoss) / (totalTrips * avgLoss) : 0;

    const buyPoints = [], sellPoints = [];
    for (let i = 0; i < n; i++) {
      if (signal[i] === 1) buyPoints.push({ idx: i, price: close[i] });
      else if (signal[i] === -1) sellPoints.push({ idx: i, price: close[i] });
    }

    return {
      close, entryUpper, entryLower, exitLower, atrArr, stopPrice,
      signal, position,
      stratNAV, benchNAV, ddArr, benchDDArr,
      buyPoints, sellPoints,
      metrics: { cumulativeReturn, benchReturn, annReturn, mdd, benchMddPct,
                 annVol, benchVol, sharpe, winRate, plr, expR,
                 nTrades: buyPoints.length + sellPoints.length,
                 buyCount: buyPoints.length, sellCount: sellPoints.length, totalTrips }
    };
  }
};

// ==================== 策略切换 ====================
let currentStrategy = 'ma';

function switchStrategy() {
  currentStrategy = document.getElementById('stratType').value;
  const maParams = document.getElementById('maParams');
  const turtleParams = document.getElementById('turtleParams');
  const tag = document.getElementById('stratTag');

  if (currentStrategy === 'ma') {
    maParams.classList.add('active');
    turtleParams.classList.remove('active');
    tag.textContent = 'MA交叉 · 金叉买入 / 死叉卖出';
    // 重建信号图数据集为双均线
    rebuildSignalChart('ma');
  } else {
    turtleParams.classList.add('active');
    maParams.classList.remove('active');
    tag.textContent = '唐奇安通道突破 · ATR动态止损';
    // 重建信号图数据集为海龟
    rebuildSignalChart('turtle');
  }
  updateStrategy(getVisibleData());
}

// ==================== 策略更新 ====================
function updateStrategy(data) {
  const labels = data.map(d => d.dateLabel);
  let result, m, signalLabel;

  if (currentStrategy === 'ma') {
    const shortP = parseInt(document.getElementById('strat_short').value);
    const longP = parseInt(document.getElementById('strat_long').value);
    result = Strategy.backtest(data, shortP, longP);
    m = result.metrics;

    // 信号图: 收盘价 + MA短 + MA长 + 买卖点
    charts.stratSignal.data.labels = labels;
    charts.stratSignal.data.datasets[0].data = result.close;
    charts.stratSignal.data.datasets[1].data = result.maShort;
    charts.stratSignal.data.datasets[2].data = result.maLong;
    const buyArr = new Array(data.length).fill(null);
    const sellArr = new Array(data.length).fill(null);
    result.buyPoints.forEach(p => buyArr[p.idx] = p.price);
    result.sellPoints.forEach(p => sellArr[p.idx] = p.price);
    charts.stratSignal.data.datasets[3].data = buyArr;
    charts.stratSignal.data.datasets[4].data = sellArr;
    charts.stratSignal.update('none');

    signalLabel = `MA${shortP}/${longP} 信号 · <b style="color:#f85149">▲买入${m.buyCount}</b> · <b style="color:#3fb950">✕卖出${m.sellCount}</b> · 累计回报 <b>${m.cumulativeReturn >= 0 ? '+' : ''}${m.cumulativeReturn.toFixed(2)}%</b>`;
  } else {
    const entryP = parseInt(document.getElementById('turtle_entry').value);
    const exitP = parseInt(document.getElementById('turtle_exit').value);
    const atrP = parseInt(document.getElementById('turtle_atr').value);
    const stopMult = parseInt(document.getElementById('turtle_stop').value) / 10;
    result = TurtleStrategy.backtest(data, entryP, exitP, atrP, stopMult);
    m = result.metrics;

    // 信号图: 收盘价 + 上轨 + 下轨 + ATR止损 + 买卖点
    charts.stratSignal.data.labels = labels;
    charts.stratSignal.data.datasets[0].data = result.close;
    charts.stratSignal.data.datasets[1].data = result.entryUpper;
    charts.stratSignal.data.datasets[2].data = result.entryLower;
    // ATR止损线 (仅持仓段)
    const stopArr = result.stopPrice.map(v => isNaN(v) ? null : v);
    charts.stratSignal.data.datasets[3].data = stopArr;
    const buyArr = new Array(data.length).fill(null);
    const sellArr = new Array(data.length).fill(null);
    result.buyPoints.forEach(p => buyArr[p.idx] = p.price);
    result.sellPoints.forEach(p => sellArr[p.idx] = p.price);
    charts.stratSignal.data.datasets[4].data = buyArr;
    charts.stratSignal.data.datasets[5].data = sellArr;
    charts.stratSignal.update('none');

    signalLabel = `DC${entryP}/${exitP} ATR${atrP} S${stopMult.toFixed(1)} · <b style="color:#f85149">▲买入${m.buyCount}</b> · <b style="color:#3fb950">✕卖出${m.sellCount}</b> · 累计回报 <b>${m.cumulativeReturn >= 0 ? '+' : ''}${m.cumulativeReturn.toFixed(2)}%</b>`;
  }

  document.getElementById('stratSignalLabel').innerHTML = signalLabel;

  // 净值图
  charts.stratNav.data.labels = labels;
  charts.stratNav.data.datasets[0].data = result.stratNAV;
  charts.stratNav.data.datasets[1].data = result.benchNAV;
  charts.stratNav.update('none');

  document.getElementById('stratNavLabel').innerHTML =
    `策略净值 <b style="color:#f85149">${result.stratNAV[data.length-1].toFixed(3)}</b> vs 基准 <b style="color:#78909C">${result.benchNAV[data.length-1].toFixed(3)}</b>`;

  // 7项指标面板
  const setMetric = (id, val, fmt, posGood) => {
    const el = document.getElementById(id);
    el.textContent = fmt(val);
    el.className = 'metric-val ' + (val > 0 ? (posGood ? 'pos' : 'neg') : val < 0 ? (posGood ? 'neg' : 'pos') : 'neutral');
  };

  // 年化收益率: 正红负绿
  setMetric('m_annReturn', m.annReturn, v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%', true);
  // 最大回撤: 越小越好(接近0)，显示负值，绿色好红色差
  const mddEl = document.getElementById('m_mdd');
  mddEl.textContent = m.mdd.toFixed(2) + '%';
  mddEl.className = 'metric-val ' + (m.mdd >= -10 ? 'pos' : m.mdd >= -20 ? 'neutral' : 'neg');
  // 波动率
  const volEl = document.getElementById('m_vol');
  volEl.textContent = m.annVol.toFixed(2) + '%';
  volEl.className = 'metric-val ' + (m.annVol <= 15 ? 'pos' : m.annVol <= 25 ? 'neutral' : 'neg');
  // 夏普
  setMetric('m_sharpe', m.sharpe, v => v.toFixed(3), true);
  // 胜率
  const wrEl = document.getElementById('m_winRate');
  wrEl.textContent = m.winRate.toFixed(1) + '%';
  wrEl.className = 'metric-val ' + (m.winRate >= 50 ? 'pos' : m.winRate >= 30 ? 'neutral' : 'neg');
  // 盈亏比
  const plrEl = document.getElementById('m_plr');
  plrEl.textContent = m.plr.toFixed(2);
  plrEl.className = 'metric-val ' + (m.plr >= 2 ? 'pos' : m.plr >= 1 ? 'neutral' : 'neg');
  // 期望收益R
  setMetric('m_expR', m.expR, v => (v >= 0 ? '+' : '') + v.toFixed(3) + 'R', true);
}

function resetStrategy() {
  if (currentStrategy === 'ma') {
    document.getElementById('strat_short').value = 5;
    document.getElementById('strat_long').value = 15;
    document.getElementById('strat_short_v').textContent = '5';
    document.getElementById('strat_long_v').textContent = '15';
  } else {
    document.getElementById('turtle_entry').value = 20;
    document.getElementById('turtle_exit').value = 10;
    document.getElementById('turtle_atr').value = 20;
    document.getElementById('turtle_stop').value = 20;
    document.getElementById('turtle_entry_v').textContent = '20';
    document.getElementById('turtle_exit_v').textContent = '10';
    document.getElementById('turtle_atr_v').textContent = '20';
    document.getElementById('turtle_stop_v').textContent = '2.0';
  }
  updateStrategy(getVisibleData());
}

// 滑块值显示
function bindSlider(id, valId, isStd) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => {
    vl.textContent = isStd ? (parseInt(el.value) / 10).toFixed(1) : el.value;
    const ind = id.split('_')[0];
    debounce(() => recalcIndicator(ind), ind);
  });
}

function setPreset(ind, type) {
  const p = PRESETS[ind][type];
  if (ind === 'rsi') {
    document.getElementById('rsi_period').value = p.period;
    document.getElementById('rsi_ob').value = p.ob;
    document.getElementById('rsi_os').value = p.os;
    document.getElementById('rsi_period_v').textContent = p.period;
    document.getElementById('rsi_ob_v').textContent = p.ob;
    document.getElementById('rsi_os_v').textContent = p.os;
  } else if (ind === 'macd') {
    document.getElementById('macd_fast').value = p.fast;
    document.getElementById('macd_slow').value = p.slow;
    document.getElementById('macd_signal').value = p.signal;
    document.getElementById('macd_fast_v').textContent = p.fast;
    document.getElementById('macd_slow_v').textContent = p.slow;
    document.getElementById('macd_signal_v').textContent = p.signal;
  } else if (ind === 'boll') {
    document.getElementById('boll_period').value = p.period;
    document.getElementById('boll_std').value = p.std;
    document.getElementById('boll_period_v').textContent = p.period;
    document.getElementById('boll_std_v').textContent = (p.std / 10).toFixed(1);
  } else if (ind === 'kdj') {
    document.getElementById('kdj_n').value = p.n;
    document.getElementById('kdj_m1').value = p.m1;
    document.getElementById('kdj_m2').value = p.m2;
    document.getElementById('kdj_n_v').textContent = p.n;
    document.getElementById('kdj_m1_v').textContent = p.m1;
    document.getElementById('kdj_m2_v').textContent = p.m2;
  }
  // 高亮按钮
  document.querySelectorAll(`.ind-row .preset-btns button`).forEach((btn, idx) => {
    const row = btn.closest('.param-side').closest('.ind-row');
    if (row.querySelector('.ind-name').textContent.toLowerCase().includes(ind.substring(0,3)) ||
        (ind === 'boll' && row.querySelector('.ind-name').textContent === 'BOLL') ||
        (row.querySelector(`#${ind}_period`) || row.querySelector(`#${ind}_fast`) || row.querySelector(`#${ind}_n`))) {
      btn.classList.remove('active');
    }
  });
  // 更精确: 找到对应行的按钮
  const rows = document.querySelectorAll('.ind-row');
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input[type=range]');
    const firstId = inputs[0]?.id || '';
    if (firstId.startsWith(ind + '_') || (ind === 'boll' && firstId === 'boll_period') || (ind === 'kdj' && firstId === 'kdj_n')) {
      const btns = row.querySelectorAll('.preset-btns button');
      const idx = type === 'conservative' ? 0 : type === 'standard' ? 1 : 2;
      btns.forEach(b => b.classList.remove('active'));
      btns[idx].classList.add('active');
    }
  });
  recalcIndicator(ind);
}

function resetParams(ind) {
  setPreset(ind, 'standard');
}

// CSV上传
document.getElementById('csvFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    rawData = parseCSV(ev.target.result);
    const code = file.name.replace(/_daily\.csv|.csv/gi, '').replace(/_/g, ' ');
    document.getElementById('stockCode').value = code || '自定义';
    recalcAll();
  };
  reader.readAsText(file, 'UTF-8');
});

document.getElementById('dateRange').addEventListener('change', recalcAll);

  bindSlider('boll_std', 'boll_std_v', true);

  // 策略滑块 - 双均线
  document.getElementById('strat_short').addEventListener('input', () => {
    document.getElementById('strat_short_v').textContent = document.getElementById('strat_short').value;
    debounce(() => updateStrategy(getVisibleData()), 'strat');
  });
  document.getElementById('strat_long').addEventListener('input', () => {
    document.getElementById('strat_long_v').textContent = document.getElementById('strat_long').value;
    debounce(() => updateStrategy(getVisibleData()), 'strat');
  });

  // 策略滑块 - 海龟
  document.getElementById('turtle_entry').addEventListener('input', () => {
    document.getElementById('turtle_entry_v').textContent = document.getElementById('turtle_entry').value;
    debounce(() => updateStrategy(getVisibleData()), 'strat');
  });
  document.getElementById('turtle_exit').addEventListener('input', () => {
    document.getElementById('turtle_exit_v').textContent = document.getElementById('turtle_exit').value;
    debounce(() => updateStrategy(getVisibleData()), 'strat');
  });
  document.getElementById('turtle_atr').addEventListener('input', () => {
    document.getElementById('turtle_atr_v').textContent = document.getElementById('turtle_atr').value;
    debounce(() => updateStrategy(getVisibleData()), 'strat');
  });
  document.getElementById('turtle_stop').addEventListener('input', () => {
    document.getElementById('turtle_stop_v').textContent = (parseInt(document.getElementById('turtle_stop').value) / 10).toFixed(1);
    debounce(() => updateStrategy(getVisibleData()), 'strat');
  });

  // 解析数据 & 初始化图表
  rawData = parseCSV(EMBEDDED_CSV);
  initCharts();
  initStrategyCharts();
  recalcAll();
});
